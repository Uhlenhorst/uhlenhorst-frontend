<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum – Auf der Uhlenhorst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #0A2A43;
    --water: #13456B;
    --water-light: #2E6690;
    --white: #FFFFFF;
    --mist: #E8EDF2;
    --gold: #C9A24B;
    --ink: #0E1B26;
    --success: #1E6B44;
    --success-bg: #E7F3EC;
    --danger: #B3261E;
    --danger-bg: #FDECEA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; color: var(--ink); background: var(--white); line-height: 1.6; }
  a { text-decoration: none; color: inherit; }
  h1, h2, h3 { font-family: 'Fraunces', serif; font-weight: 600; }

  header { background: var(--deep); border-bottom: 1px solid rgba(255,255,255,0.08); }
  .nav-wrap { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; gap: 12px; flex-wrap: nowrap; }
  .logo { color: var(--white); font-size: 1.2rem; display: flex; align-items: baseline; gap: 8px; flex-shrink: 0; white-space: nowrap; }
  .logo em { font-style: italic; color: var(--gold); }
  .auth-area { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .btn { padding: 9px 18px; border-radius: 5px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; white-space: nowrap; }
  .btn-gold { background: var(--gold); color: var(--deep); }
  .btn-gold:hover { background: #d9b566; }
  .btn-ghost { background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,0.3); }
  .btn-ghost:hover { border-color: var(--white); }
  .user-pill { color: rgba(255,255,255,0.85); font-size: 0.85rem; white-space: nowrap; }

  .hero { background: linear-gradient(160deg, var(--deep) 0%, var(--water) 100%); color: var(--white); padding: 44px 28px 38px; }
  .hero-inner { max-width: 1100px; margin: 0 auto; }
  .eyebrow { font-size: 0.76rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 10px; }
  .hero h1 { font-size: 2.1rem; }

  main { max-width: 1100px; margin: 0 auto; padding: 36px 28px 80px; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
  .cat-filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-chip {
    padding: 7px 14px; border-radius: 16px; font-size: 0.82rem; font-weight: 600;
    color: var(--water); background: rgba(19,69,107,0.08); cursor: pointer; border: none;
  }
  .cat-chip.active { background: var(--deep); color: var(--white); }

  .thread-list { display: flex; flex-direction: column; border: 1px solid var(--mist); border-radius: 8px; overflow: hidden; }
  .thread-row {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 18px 20px; border-bottom: 1px solid var(--mist); cursor: pointer; transition: background 0.15s;
  }
  .thread-row:last-child { border-bottom: none; }
  .thread-row:hover { background: var(--mist); }
  .thread-tag {
    display: inline-block; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--water); background: rgba(19,69,107,0.08); padding: 3px 9px; border-radius: 3px; margin-bottom: 6px;
  }
  .thread-title { font-family: 'Fraunces', serif; font-size: 1.05rem; color: var(--deep); }
  .thread-meta { font-size: 0.8rem; color: #8294a0; margin-top: 4px; }
  .thread-stats { text-align: right; flex-shrink: 0; }
  .thread-stats .count { font-family: 'Fraunces', serif; font-size: 1.2rem; color: var(--water); }
  .thread-stats .label { font-size: 0.72rem; color: #8294a0; }

  .empty-state, .loading-state { padding: 60px 30px; text-align: center; color: #6b7d89; background: var(--mist); border-radius: 8px; }
  .empty-state h3 { color: var(--deep); margin-bottom: 6px; }

  .fab-add {
    position: fixed; bottom: 28px; right: 28px; background: var(--gold); color: var(--deep);
    border: none; border-radius: 30px; padding: 14px 24px; font-weight: 700; font-size: 0.9rem;
    cursor: pointer; box-shadow: 0 14px 34px rgba(0,0,0,0.25);
  }
  .fab-add:hover { background: #d9b566; }

  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.86rem; color: var(--water); font-weight: 600; margin-bottom: 18px; cursor: pointer; }
  .thread-header { margin-bottom: 24px; }
  .thread-header .thread-title { font-size: 1.6rem; margin-top: 6px; }
  .thread-header .thread-meta { margin-top: 8px; }

  .post-card { border: 1px solid var(--mist); border-radius: 8px; padding: 20px 22px; margin-bottom: 12px; }
  .post-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .post-author { font-weight: 600; color: var(--deep); font-size: 0.92rem; }
  .post-date { font-size: 0.78rem; color: #8294a0; }
  .post-body { font-size: 0.92rem; color: #2a3942; white-space: pre-wrap; }
  .post-image {
    margin-top: 14px; max-width: 100%; max-height: 420px; border-radius: 8px;
    border: 1px solid var(--mist); cursor: zoom-in; display: block;
  }
  .post-delete { font-size: 0.76rem; color: var(--danger); cursor: pointer; background: none; border: none; font-weight: 600; }

  .reply-box { margin-top: 24px; }
  .reply-box textarea {
    width: 100%; min-height: 100px; padding: 13px; border: 1px solid #d8e0e6; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-size: 0.92rem; resize: vertical;
  }
  .reply-box textarea:focus { outline: none; border-color: var(--water); }
  .reply-actions { margin-top: 10px; display: flex; justify-content: flex-end; }
  .login-prompt { background: var(--mist); border-radius: 8px; padding: 20px; text-align: center; font-size: 0.9rem; color: #5c6e79; margin-top: 24px; }
  .login-prompt a { color: var(--water); font-weight: 600; }

  .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(10,42,67,0.55); z-index: 2000; isolation: isolate; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: var(--white); border-radius: 10px; max-width: 520px; width: 100%; padding: 32px; max-height: 90vh; overflow-y: auto; position: relative; z-index: 1; }
  .modal-box h2 { color: var(--deep); font-size: 1.3rem; margin-bottom: 6px; }
  .modal-sub { font-size: 0.86rem; color: #6b7d89; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--deep); margin-bottom: 6px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 11px 13px; border: 1px solid #d8e0e6; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-size: 0.9rem;
  }
  .field input[type="file"] { padding: 8px 13px; background: var(--white); cursor: pointer; }
  .field textarea { resize: vertical; min-height: 120px; }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--water); }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-deep { background: var(--deep); color: var(--white); flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
  .btn-deep:hover { background: var(--water); }
  .btn-deep:disabled { background: #9fb3c0; cursor: default; }
  .btn-cancel { background: transparent; color: #6b7d89; border: 1px solid #d8e0e6; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
  .modal-msg { font-size: 0.85rem; padding: 10px 12px; border-radius: 6px; margin-bottom: 14px; display: none; }
  .modal-msg.show { display: block; }
  .modal-msg.error { background: var(--danger-bg); color: var(--danger); }
  .modal-msg.success { background: var(--success-bg); color: var(--success); }
  .close-x { position: absolute; top: 14px; right: 18px; font-size: 1.3rem; color: #8294a0; cursor: pointer; background: none; border: none; }

  /* Lightbox (Foto-Vergrößerung) */
  .lightbox-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,42,67,0.85); z-index: 3000; align-items: center; justify-content: center;
    padding: 24px; cursor: zoom-out;
  }
  .lightbox-overlay.show { display: flex; }
  .lightbox-overlay img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); cursor: default; }
  .lightbox-close { position: fixed; top: 22px; right: 28px; font-size: 2rem; color: var(--white); background: none; border: none; cursor: pointer; line-height: 1; }

  @media (max-width: 600px) {
    .thread-row { flex-direction: column; align-items: flex-start; }
    .thread-stats { text-align: left; }

    .nav-wrap { padding: 12px 14px; gap: 6px; }
    .logo { font-size: 0.92rem; gap: 3px; }
    .btn { padding: 7px 12px; font-size: 0.74rem; }
    .user-pill { display: none; }

    .hero { padding: 28px 16px 26px; }
    .hero h1 { font-size: 1.6rem; }

    main { padding: 24px 16px 90px; }

    .modal-box { padding: 22px 18px; }
  }
  @media (max-width: 760px) {
    .main-nav { display: none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="nav-wrap">
    <a href="auf-der-uhlenhorst-home.html" class="logo">Auf der <em>Uhlenhorst</em></a>
    <nav class="main-nav" style="display:flex; gap:24px;">
      <a href="auf-der-uhlenhorst-verzeichnis.html" style="color:rgba(255,255,255,0.75); font-size:0.88rem; font-weight:500;">Geschäfte</a>
      <a href="auf-der-uhlenhorst-termine.html" style="color:rgba(255,255,255,0.75); font-size:0.88rem; font-weight:500;">Moin Uhlenhorst</a>
      <a href="auf-der-uhlenhorst-unser-uhlenhorst.html" style="color:rgba(255,255,255,0.75); font-size:0.88rem; font-weight:500;">Unser Uhlenhorst</a>
      <a href="auf-der-uhlenhorst-forum.html" style="color:var(--gold); font-size:0.88rem; font-weight:600;">Forum</a>
      <a href="auf-der-uhlenhorst-shop.html" style="color:rgba(255,255,255,0.75); font-size:0.88rem; font-weight:500;">Shop</a>
    </nav>
    <div class="auth-area" id="authArea">
      <button class="btn btn-ghost" onclick="window.location.href='auf-der-uhlenhorst-login.html'">Anmelden</button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <div class="eyebrow">Austausch</div>
    <h1>Forum</h1>
  </div>
</section>

<main>

  <div id="listView">
    <div class="toolbar">
      <div class="cat-filters" id="catFilters">
        <button class="cat-chip active" data-slug="" onclick="selectCategory('')">Alle</button>
      </div>
    </div>

    <div id="threadsContainer">
      <div class="loading-state">Themen werden geladen …</div>
    </div>
  </div>

  <div id="threadView" style="display:none;">
    <div class="back-link" onclick="showListView()">← Zurück zum Forum</div>
    <div class="thread-header">
      <span class="thread-tag" id="threadCatTag"></span>
      <div class="thread-title" id="threadTitleDisplay"></div>
      <div class="thread-meta" id="threadMetaDisplay"></div>
    </div>

    <div id="postsContainer"></div>

    <div id="replySection"></div>
  </div>

</main>

<button class="fab-add" id="fabAdd" onclick="openNewThreadModal()" style="display:none;">+ Neues Thema</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <button class="close-x" onclick="closeNewThreadModal()">&times;</button>
    <h2>Neues Thema</h2>
    <p class="modal-sub">Starte eine Diskussion mit der Nachbarschaft.</p>

    <div class="modal-msg" id="modalMsg"></div>

    <form id="newThreadForm" onsubmit="handleSubmitThread(event)">
      <div class="field">
        <label for="ntTitle">Titel *</label>
        <input type="text" id="ntTitle" required placeholder="Worum geht es?">
      </div>
      <div class="field">
        <label for="ntCategory">Kategorie</label>
        <select id="ntCategory"></select>
      </div>
      <div class="field">
        <label for="ntBody">Dein Beitrag *</label>
        <textarea id="ntBody" required placeholder="Schreib hier deinen Text …"></textarea>
      </div>
      <div class="field">
        <label for="ntPhoto">Foto (optional)</label>
        <input type="file" id="ntPhoto" accept="image/*">
        <div id="ntPhotoPreviewWrap" style="margin-top:10px; display:none;">
          <img id="ntPhotoPreview" style="max-width:160px; max-height:160px; border-radius:6px; border:1px solid #d8e0e6;">
        </div>
        <div id="ntUploadStatus" style="font-size:0.78rem; color:#8294a0; margin-top:5px;"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeNewThreadModal()">Abbrechen</button>
        <button type="submit" class="btn-deep" id="submitThreadBtn">Veröffentlichen</button>
      </div>
    </form>
  </div>
</div>

<!-- Lightbox (Foto-Vergrößerung) -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  const API_BASE = 'https://uhlenhorst-backend.onrender.com/api';
  let categories = [];
  let activeCategorySlug = '';
  let currentThreadId = null;

  const token = localStorage.getItem('uhlenhorst_token');
  const user = JSON.parse(localStorage.getItem('uhlenhorst_user') || 'null');
  const isAdmin = user && user.role === 'admin';

  if (user) {
    document.getElementById('authArea').innerHTML = `
      <span class="user-pill">Hallo, ${escapeHtml(user.name.split(' ')[0])}</span>
      <button class="btn btn-ghost" onclick="logout()">Abmelden</button>
    `;
    document.getElementById('fabAdd').style.display = 'block';
  }

  function logout() {
    localStorage.removeItem('uhlenhorst_token');
    localStorage.removeItem('uhlenhorst_user');
    window.location.reload();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  // ---- Lightbox (Foto groß anzeigen) ----
  function openLightbox(event, imageUrl) {
    if (event) event.stopPropagation();
    document.getElementById('lightboxImg').src = imageUrl;
    document.getElementById('lightboxOverlay').classList.add('show');
  }
  function closeLightbox(event) {
    if (event) event.stopPropagation();
    document.getElementById('lightboxOverlay').classList.remove('show');
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });

  function timeAgo(dateStr) {
    const date = new Date(dateStr);
    const diffMs = Date.now() - date.getTime();
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return 'gerade jetzt';
    if (diffMin < 60) return `vor ${diffMin} Min.`;
    const diffH = Math.floor(diffMin / 60);
    if (diffH < 24) return `vor ${diffH} Std.`;
    const diffD = Math.floor(diffH / 24);
    if (diffD === 1) return 'gestern';
    if (diffD < 7) return `vor ${diffD} Tagen`;
    return date.toLocaleDateString('de-DE', { day: 'numeric', month: 'long' });
  }

  async function loadCategories() {
    try {
      const res = await fetch(`${API_BASE}/forum/categories`);
      categories = await res.json();

      const filterBar = document.getElementById('catFilters');
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-chip';
        btn.textContent = cat.name;
        btn.dataset.slug = cat.slug;
        btn.onclick = () => selectCategory(cat.slug);
        filterBar.appendChild(btn);
      });

      const select = document.getElementById('ntCategory');
      select.innerHTML = categories.map(cat => `<option value="${cat.id}">${escapeHtml(cat.name)}</option>`).join('');
    } catch (err) {
      console.error('Kategorien konnten nicht geladen werden.');
    }
  }

  function selectCategory(slug) {
    activeCategorySlug = slug;
    document.querySelectorAll('.cat-chip').forEach(chip => {
      chip.classList.toggle('active', chip.dataset.slug === slug);
    });
    loadThreads();
  }

  async function loadThreads() {
    const container = document.getElementById('threadsContainer');
    container.innerHTML = '<div class="loading-state">Themen werden geladen …</div>';

    try {
      const url = activeCategorySlug
        ? `${API_BASE}/forum/threads?category=${activeCategorySlug}`
        : `${API_BASE}/forum/threads`;
      const res = await fetch(url);
      const threads = await res.json();

      if (threads.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>Noch keine Themen</h3>
            <p>Sei die/der Erste und starte eine Diskussion.</p>
          </div>`;
        return;
      }

      container.innerHTML = `<div class="thread-list">` + threads.map(t => `
        <div class="thread-row" onclick="openThread('${t.id}')">
          <div>
            ${t.category_name ? `<span class="thread-tag">${escapeHtml(t.category_name)}</span>` : ''}
            <div class="thread-title">${escapeHtml(t.title)}</div>
            <div class="thread-meta">von ${escapeHtml(t.author_name || 'Unbekannt')} · ${timeAgo(t.last_activity || t.created_at)}</div>
          </div>
          <div class="thread-stats">
            <div class="count">${t.post_count}</div>
            <div class="label">Antworten</div>
          </div>
        </div>
      `).join('') + `</div>`;
    } catch (err) {
      container.innerHTML = '<div class="empty-state"><h3>Verbindung fehlgeschlagen</h3><p>Bitte später erneut versuchen.</p></div>';
    }
  }

  function showListView() {
    document.getElementById('listView').style.display = 'block';
    document.getElementById('threadView').style.display = 'none';
    currentThreadId = null;
  }

  async function openThread(id) {
    currentThreadId = id;
    document.getElementById('listView').style.display = 'none';
    document.getElementById('threadView').style.display = 'block';
    document.getElementById('postsContainer').innerHTML = '<div class="loading-state">Lädt …</div>';
    document.getElementById('replySection').innerHTML = '';

    try {
      const res = await fetch(`${API_BASE}/forum/threads/${id}`);
      const data = await res.json();

      document.getElementById('threadCatTag').textContent = data.thread.category_name || '';
      document.getElementById('threadCatTag').style.display = data.thread.category_name ? 'inline-block' : 'none';
      document.getElementById('threadTitleDisplay').textContent = data.thread.title;
      document.getElementById('threadMetaDisplay').textContent =
        `von ${data.thread.author_name || 'Unbekannt'} · ${timeAgo(data.thread.created_at)}`;

      renderPosts(data.posts);
      renderReplyBox();
    } catch (err) {
      document.getElementById('postsContainer').innerHTML = '<div class="empty-state"><h3>Verbindung fehlgeschlagen</h3></div>';
    }
  }

  function renderPosts(posts) {
    const container = document.getElementById('postsContainer');
    container.innerHTML = posts.map(p => `
      <div class="post-card" id="post-${p.id}">
        <div class="post-head">
          <span class="post-author">${escapeHtml(p.author_name || 'Unbekannt')}</span>
          <span class="post-date">${timeAgo(p.created_at)}</span>
        </div>
        <div class="post-body">${escapeHtml(p.body)}</div>
        ${p.image_url ? `<img class="post-image" src="${escapeHtml(p.image_url)}" alt="Bild zum Beitrag" onclick="openLightbox(event, '${escapeHtml(p.image_url)}')">` : ''}
        ${isAdmin ? `<div style="margin-top:10px;"><button class="post-delete" onclick="deletePost('${p.id}')">Löschen</button></div>` : ''}
      </div>
    `).join('');
  }

  function renderReplyBox() {
    const section = document.getElementById('replySection');
    if (token) {
      section.innerHTML = `
        <div class="reply-box">
          <textarea id="replyBody" placeholder="Schreib eine Antwort …"></textarea>
          <div class="reply-actions">
            <button class="btn-deep" style="flex:none; padding:11px 24px;" onclick="handleReply()" id="replyBtn">Antworten</button>
          </div>
        </div>`;
    } else {
      section.innerHTML = `
        <div class="login-prompt">
          <a onclick="window.location.href='auf-der-uhlenhorst-login.html'">Melde dich an</a>, um an der Diskussion teilzunehmen.
        </div>`;
    }
  }

  async function handleReply() {
    const body = document.getElementById('replyBody').value.trim();
    if (!body) return;

    const btn = document.getElementById('replyBtn');
    btn.disabled = true;
    btn.textContent = 'Sendet …';

    try {
      const res = await fetch(`${API_BASE}/forum/threads/${currentThreadId}/posts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ body })
      });
      if (res.ok) {
        openThread(currentThreadId);
      } else {
        btn.disabled = false;
        btn.textContent = 'Antworten';
        alert('Antwort konnte nicht gesendet werden.');
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Antworten';
      alert('Verbindung zum Server fehlgeschlagen.');
    }
  }

  async function deletePost(id) {
    if (!confirm('Diesen Beitrag wirklich löschen?')) return;
    try {
      const res = await fetch(`${API_BASE}/forum/posts/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) openThread(currentThreadId);
    } catch (err) {
      alert('Löschen fehlgeschlagen.');
    }
  }

  function openNewThreadModal() {
    if (!token) {
      window.location.href = 'auf-der-uhlenhorst-login.html';
      return;
    }
    document.getElementById('newThreadForm').reset();
    document.getElementById('modalMsg').className = 'modal-msg';
    document.getElementById('ntPhotoPreviewWrap').style.display = 'none';
    document.getElementById('ntUploadStatus').textContent = '';
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeNewThreadModal() {
    document.getElementById('modalOverlay').classList.remove('show');
  }

  // Zeigt eine kleine Vorschau, sobald ein Foto ausgewählt wurde
  document.addEventListener('DOMContentLoaded', () => {
    const photoInput = document.getElementById('ntPhoto');
    if (photoInput) {
      photoInput.addEventListener('change', () => {
        const file = photoInput.files[0];
        const wrap = document.getElementById('ntPhotoPreviewWrap');
        const img = document.getElementById('ntPhotoPreview');
        if (file) {
          img.src = URL.createObjectURL(file);
          wrap.style.display = 'block';
        } else {
          wrap.style.display = 'none';
        }
      });
    }
  });

  // Lädt ein Foto zu Cloudinary hoch und gibt die fertige Bild-URL zurück.
  async function uploadThreadPhotoIfPresent(currentToken) {
    const fileInput = document.getElementById('ntPhoto');
    const statusEl = document.getElementById('ntUploadStatus');
    const file = fileInput.files[0];

    if (!file) return null;

    statusEl.textContent = 'Foto wird hochgeladen …';

    try {
      const sigRes = await fetch(`${API_BASE}/upload/signature`, {
        headers: { 'Authorization': `Bearer ${currentToken}` }
      });
      if (!sigRes.ok) {
        statusEl.textContent = 'Foto-Upload nicht möglich – Thema wird ohne Foto veröffentlicht.';
        return null;
      }
      const sig = await sigRes.json();

      const formData = new FormData();
      formData.append('file', file);
      formData.append('api_key', sig.apiKey);
      formData.append('timestamp', sig.timestamp);
      formData.append('signature', sig.signature);

      const uploadRes = await fetch(
        `https://api.cloudinary.com/v1_1/${sig.cloudName}/image/upload`,
        { method: 'POST', body: formData }
      );
      const uploadData = await uploadRes.json();

      if (!uploadData.secure_url) {
        statusEl.textContent = 'Foto-Upload fehlgeschlagen – Thema wird ohne Foto veröffentlicht.';
        return null;
      }

      statusEl.textContent = 'Foto erfolgreich hochgeladen.';
      return uploadData.secure_url;

    } catch (err) {
      statusEl.textContent = 'Foto-Upload fehlgeschlagen – Thema wird ohne Foto veröffentlicht.';
      return null;
    }
  }

  async function handleSubmitThread(event) {
    event.preventDefault();
    const msgBox = document.getElementById('modalMsg');
    msgBox.className = 'modal-msg';
    const btn = document.getElementById('submitThreadBtn');
    btn.disabled = true;
    btn.textContent = 'Veröffentlicht …';

    const imageUrl = await uploadThreadPhotoIfPresent(token);

    const payload = {
      title: document.getElementById('ntTitle').value.trim(),
      category_id: document.getElementById('ntCategory').value,
      body: document.getElementById('ntBody').value.trim(),
      image_url: imageUrl,
    };

    try {
      const res = await fetch(`${API_BASE}/forum/threads`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (!res.ok) {
        msgBox.textContent = data.error || 'Thema konnte nicht erstellt werden.';
        msgBox.className = 'modal-msg show error';
        btn.disabled = false;
        btn.textContent = 'Veröffentlichen';
        return;
      }

      closeNewThreadModal();
      btn.disabled = false;
      btn.textContent = 'Veröffentlichen';
      openThread(data.thread.id);
    } catch (err) {
      msgBox.textContent = 'Verbindung zum Server fehlgeschlagen.';
      msgBox.className = 'modal-msg show error';
      btn.disabled = false;
      btn.textContent = 'Veröffentlichen';
    }
  }

  loadCategories();
  loadThreads();
</script>
